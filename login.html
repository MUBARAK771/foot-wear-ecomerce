<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Login | FOOT WEARS</title>
      <link rel="stylesheet" href="index.css">
      <style>
            body {
                  background: var(--bg-light);
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  height: 100vh;
                  flex-direction: column;
            }
            .login-card {
                  background: #fff;
                  padding: 3rem;
                  border-radius: 20px;
                  box-shadow: var(--shadow-lg);
                  width: 100%;
                  max-width: 400px;
                  text-align: center;
            }
            .login-card h2 {
                  margin-bottom: 2rem;
                  text-transform: uppercase;
                  letter-spacing: 2px;
            }
            input {
                  width: 100%;
                  padding: 1rem;
                  margin-bottom: 1rem;
                  border: 1px solid #ddd;
                  border-radius: 8px;
                  outline: none;
            }
            button {
                  width: 100%;
                  padding: 1rem;
                  background: var(--bg-dark);
                  color: var(--primary);
                  border: none;
                  border-radius: 50px;
                  font-weight: 700;
                  text-transform: uppercase;
                  cursor: pointer;
                  transition: var(--transition);
            }
            button:hover {
                  background: var(--primary);
                  color: var(--bg-dark);
            }
            .footer-links {
                  margin-top: 2rem;
            }
            .footer-links a {
                  color: #666;
                  text-decoration: none;
                  font-size: 0.9rem;
            }
      </style>
</head>

<body>
      <div class="login-card">
            <h1 class="logo" style="margin-bottom: 2rem; color: var(--bg-dark);">FOOT WEARS</h1>
            <form action="#">
                  <h2>Login</h2>
                  <input type="email" placeholder="Email Address" required>
                  <input type="password" placeholder="Password" required>
                  <button type="submit">Sign In</button>
            </form>
            <div class="footer-links">
                  <a href="form.html">Create an Account</a>
            </div>
      </div>
</body>

</html>
