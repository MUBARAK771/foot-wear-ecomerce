<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Admin Access | FOOT WEARS</title>
      <link rel="stylesheet" href="forms.css">
      <style>
            .toggle {
                  background: linear-gradient(to right, #D4AF37, #1A1A1A);
            }
            .container button {
                  background-color: var(--bg-dark);
                  color: var(--primary);
            }
            .container button:hover {
                  background-color: var(--primary);
                  color: var(--bg-dark);
            }
      </style>
</head>

<body>
      <div class="container" id="container">
            <div class="form-container sign-up">
                  <form>
                        <h1>Admin Registration</h1>
                        <div class="social-icons">
                              <a href="#" class="icon">G</a>
                              <a href="#" class="icon">F</a>
                        </div>
                        <span>Restricted to authorized personnel</span>
                        <input type="text" placeholder="Full Name">
                        <input type="email" placeholder="Work Email">
                        <input type="password" placeholder="Access Code">
                        <input type="password" placeholder="Password">
                        <button type="submit">Request Access</button>
                  </form>
            </div>

            <div class="form-container sign-in">
                  <form>
                        <h1>Admin Portal</h1>
                        <div class="social-icons">
                              <a href="#" class="icon">G</a>
                              <a href="#" class="icon">F</a>
                        </div>
                        <span>Please enter your credentials</span>
                        <input type="email" placeholder="Email">
                        <input type="password" placeholder="Password">
                        <a href="#">Forgot password?</a>
                        <button type="submit"><a href="dashboard.html" style="color: inherit; margin: 0;">Login to Dashboard</a></button>
                  </form>
            </div>

            <div class="toggle-container">
                  <div class="toggle">
                        <div class="toggle-panel toggle-left">
                              <h1>System Access</h1>
                              <p>Login to manage the store and view analytics</p>
                              <button class="hidden" id="login">Sign In</button>
                        </div>

                        <div class="toggle-panel toggle-right">
                              <h1>Internal Only</h1>
                              <p>Register for administrative privileges. Approval required.</p>
                              <button class="hidden" id="register">Request Account</button>
                        </div>
                  </div>
            </div>
      </div>

      <script>
            const container = document.getElementById("container");
            const registerBtn = document.getElementById("register");
            const loginBtn = document.getElementById("login");

            registerBtn.addEventListener('click', () => {
                  container.classList.add("active");
            });

            loginBtn.addEventListener('click', () => {
                  container.classList.remove("active");
            });
      </script>
</body>

</html>
